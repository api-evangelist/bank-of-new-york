description: >-
  The Bank of New York was one of the oldest banks in the United States, founded in 1784.
  In 2007, it merged with Mellon Financial Corporation to form BNY Mellon (Bank of New York
  Mellon Corporation), which now operates as a global investments company providing asset
  servicing, treasury services, and wealth management. See the bank-of-new-york-mellon
  repository for current API documentation.
